<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>THE BLINDFANG</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}
#hud{
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    z-index:999;
}
#crosshair{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:20px;
}
</style>
</head>
<body>

<div id="hud">
    Stamina: <span id="stamina">100</span><br>
    Objective: Find Exit
</div>

<div id="crosshair">+</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.PointLight(0xffffff,1,30);
light.position.set(0,5,0);
scene.add(light);

camera.position.set(0,2,0);

const floor = new THREE.Mesh(
new THREE.PlaneGeometry(100,100),
new THREE.MeshStandardMaterial({color:0x111111})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

for(let i=0;i<30;i++){

let wall = new THREE.Mesh(
new THREE.BoxGeometry(4,4,1),
new THREE.MeshStandardMaterial({color:0x333333})
);

wall.position.set(
(Math.random()-0.5)*80,
2,
(Math.random()-0.5)*80
);

scene.add(wall);
}

const monster = new THREE.Mesh(
new THREE.BoxGeometry(2,4,2),
new THREE.MeshStandardMaterial({
color:0xffffff
})
);

monster.position.set(20,2,20);
scene.add(monster);

let keys={};

document.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()] = false;
});

let stamina = 100;

function movePlayer(){

let speed = 0.12;

if(keys["shift"] && stamina > 0){
speed = 0.22;
stamina -= 0.25;
}else{
stamina += 0.05;
}

stamina=Math.max(0,Math.min(100,stamina));

document.getElementById("stamina").innerText =
Math.floor(stamina);

if(keys["w"]) camera.position.z -= speed;
if(keys["s"]) camera.position.z += speed;
if(keys["a"]) camera.position.x -= speed;
if(keys["d"]) camera.position.x += speed;
}

function monsterAI(){

const dx = camera.position.x - monster.position.x;
const dz = camera.position.z - monster.position.z;

const dist = Math.sqrt(dx*dx + dz*dz);

if(dist < 50){

monster.position.x += dx * 0.005;
monster.position.z += dz * 0.005;
}

if(dist < 2){

alert("GAME OVER\nThe Blindfang found you.");
location.reload();
}
}

function flicker(){

light.intensity =
0.5 + Math.random()*0.8;
}

function animate(){

requestAnimationFrame(animate);

movePlayer();

monsterAI();

flicker();

light.position.copy(camera.position);

renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{

camera.aspect=
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>

</body>
</html>
